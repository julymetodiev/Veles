# Custom cargo-dist publish job: pushes the four library crates to crates.io
# in dependency order. Triggered by release.yml after the GitHub Release
# artifacts have been uploaded.
#
# Idempotent: each crate is checked against crates.io's API before
# publishing, so re-running this workflow on a tag whose crates are already
# published (e.g. when a release was bootstrapped manually, or when the
# workflow is retried after a partial failure) is a no-op.
#
# Required secrets:
#   CARGO_REGISTRY_TOKEN  — crates.io API token with publish scope
#                           (Settings → Secrets and variables → Actions)

name: Publish to crates.io

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        run: rustup update stable --no-self-update && rustup default stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish in dependency order (idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          # Skip-or-publish: query crates.io's HTTP API for the (crate, version)
          # tuple. 200 OK → already published, skip. 404 → publish.
          publish_if_new() {
            local crate="$1"
            local version
            version=$(cargo pkgid -p "$crate" | sed -E 's/.*[#@]//')
            if curl -sf -o /dev/null \
                "https://crates.io/api/v1/crates/${crate}/${version}"; then
              echo "✓ ${crate} ${version} already on crates.io — skipping"
            else
              echo "→ Publishing ${crate} ${version}"
              cargo publish -p "${crate}"
            fi
          }

          publish_if_new veles-core
          publish_if_new veles-grpc
          publish_if_new veles-mcp
          publish_if_new veles-cli
